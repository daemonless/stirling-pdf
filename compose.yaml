name: stirling-pdf

x-daemonless:
  title: "Stirling-PDF"
  icon: ":material-file-pdf-box:"
  category: "Utilities"
  description: "Locally hosted web application for performing various operations on PDF files — merge, split, compress, convert, OCR, and more."
  upstream_url: "https://github.com/Stirling-Tools/Stirling-PDF"
  web_url: "https://www.stirlingpdf.com/"
  freshports_url: "https://www.freshports.org/deskutils/stirling-pdf/"
  user: "bsd"
  mlock: false
  community: "Discord:https://discord.gg/Kb9tkhecZT"
  appjail: true

  docs:
    env:
      PUID: "User ID for the application process"
      PGID: "Group ID for the application process"
      TZ: "Timezone for the container"
    volumes:
      /config: "Configuration directory"
    ports:
      8080: "Web UI"

services:
  stirling-pdf:
    image: ghcr.io/daemonless/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC

    volumes:
      - /path/to/containers/stirling-pdf:/config

    ports:
      - 8080:8080
